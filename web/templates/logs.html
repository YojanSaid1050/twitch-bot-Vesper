{% extends "base.html" %}

{% block title %}VesperBot - Logs{% endblock %}
{% block header %}Registro de Eventos (Logs){% endblock %}

{% block content %}
<div class="card full-width">
    <div class="card-header">
        <i class="fas fa-list-ul"></i>
        <h3>Logs del Sistema</h3>
        <div style="display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap;">
            <button onclick="clearLogs()" class="btn-danger btn-sm">
                <i class="fas fa-trash"></i> Limpiar
            </button>
            <button onclick="refreshLogs()" class="btn-primary btn-sm">
                <i class="fas fa-sync"></i> Refrescar
            </button>
            <label style="display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary);">
                Auto-refresh
                <input type="checkbox" id="auto-refresh-toggle" checked>
            </label>
        </div>
    </div>
    <div class="card-body">
        <!-- Filtros -->
        <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;">
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 120px;">
                <label>Nivel</label>
                <select id="filter-level" class="form-control" style="width: 100%;">
                    <option value="">Todos</option>
                    <option value="INFO">INFO</option>
                    <option value="WARNING">WARNING</option>
                    <option value="ERROR">ERROR</option>
                    <option value="CRITICAL">CRITICAL</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 120px;">
                <label>Fuente</label>
                <select id="filter-source" class="form-control" style="width: 100%;">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 100px;">
                <label>Límite</label>
                <select id="filter-limit" class="form-control" style="width: 100%;">
                    <option value="50">50</option>
                    <option value="100" selected>100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                </select>
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button onclick="applyFilters()" class="btn-primary btn-sm">
                    <i class="fas fa-filter"></i> Aplicar
                </button>
            </div>
        </div>

        <!-- Tabla de logs -->
        <div class="table-wrapper" style="max-height: 500px; overflow-y: auto;">
            <table class="table" id="logs-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">Nivel</th>
                        <th style="width: 180px;">Timestamp</th>
                        <th style="width: 150px;">Fuente</th>
                        <th>Mensaje</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <tr>
                        <td colspan="4" class="text-center">Cargando logs...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div style="margin-top: 8px; font-size: 12px; color: var(--text-muted); text-align: right;">
            Mostrando <span id="logs-count">0</span> registros
        </div>
    </div>
</div>

<style>
    .log-level-INFO td:first-child { color: #3b82f6; }
    .log-level-WARNING td:first-child { color: #f59e0b; }
    .log-level-ERROR td:first-child { color: #ef4444; }
    .log-level-CRITICAL td:first-child { color: #dc2626; font-weight: bold; }
</style>

<script>
let refreshInterval = null;
let isLoading = false;

function loadSources() {
    fetch('/api/logs?limit=1')
        .then(res => res.json())
        .then(data => {
            const select = document.getElementById('filter-source');
            const currentValue = select.value;
            select.innerHTML = '<option value="">Todas</option>';
            if (data.sources) {
                data.sources.forEach(source => {
                    const opt = document.createElement('option');
                    opt.value = source;
                    opt.textContent = source;
                    select.appendChild(opt);
                });
            }
            if (currentValue) select.value = currentValue;
        })
        .catch(() => {});
}

function applyFilters() {
    const level = document.getElementById('filter-level').value;
    const source = document.getElementById('filter-source').value;
    const limit = document.getElementById('filter-limit').value;
    loadLogs(level, source, limit);
}

function loadLogs(level, source, limit) {
    if (isLoading) return;
    isLoading = true;
    let url = `/api/logs?limit=${limit || 100}`;
    if (level) url += `&level=${level}`;
    if (source) url += `&source=${source}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('logs-body');
            const count = document.getElementById('logs-count');
            if (!data.logs || data.logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">No hay logs para mostrar</td></tr>';
                count.textContent = '0';
                return;
            }
            count.textContent = data.logs.length;
            tbody.innerHTML = data.logs.map(log => `
                <tr class="log-level-${log.level}">
                    <td><strong>${log.level}</strong></td>
                    <td style="font-size: 12px; color: var(--text-secondary);">${new Date(log.timestamp).toLocaleString()}</td>
                    <td style="font-size: 12px; color: var(--text-secondary);">${log.source}</td>
                    <td>${log.message}</td>
                </tr>
            `).join('');
        })
        .catch(err => {
            console.error('Error cargando logs:', err);
            document.getElementById('logs-body').innerHTML = '<tr><td colspan="4" class="text-center">❌ Error al cargar logs</td></tr>';
        })
        .finally(() => {
            isLoading = false;
        });
}

function refreshLogs() {
    applyFilters();
}

async function clearLogs() {
    const confirmed = await showModal(
        '⚠️ Confirmar limpieza',
        '¿Estás seguro de que quieres eliminar todos los logs? Esta acción no se puede deshacer.',
        'Limpiar',
        'Cancelar',
        'danger'
    );
    
    if (!confirmed) return;
    
    fetch('/api/logs/clear', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                showToast('✅ Logs limpiados', 'success');
                refreshLogs();
            } else {
                showToast('❌ Error: ' + data.error, 'error');
            }
        })
        .catch(err => {
            showToast('❌ Error al limpiar logs', 'error');
        });
}

document.getElementById('filter-level').addEventListener('change', applyFilters);
document.getElementById('filter-source').addEventListener('change', applyFilters);
document.getElementById('filter-limit').addEventListener('change', applyFilters);

document.getElementById('auto-refresh-toggle').addEventListener('change', function() {
    if (this.checked) {
        refreshInterval = setInterval(refreshLogs, 10000);
    } else {
        clearInterval(refreshInterval);
        refreshInterval = null;
    }
});

// Inicializar
loadSources();
applyFilters();

// Auto-refresh cada 10 segundos por defecto
refreshInterval = setInterval(refreshLogs, 10000);

// Limpiar al salir
window.addEventListener('beforeunload', function() {
    if (refreshInterval) clearInterval(refreshInterval);
});
</script>
{% endblock %}
