<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VesperBot — Iniciar Sesión</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Reutilizamos el mismo CSS global -->
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        /* Ajustes específicos para la página de login */
        .login-page {
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 44px 36px 36px;
            box-shadow: var(--shadow-lg);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .login-box:hover {
            border-color: var(--accent);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
            line-height: 1;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
            font-weight: 400;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .login-form .form-group label i {
            margin-right: 6px;
            color: var(--accent);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: color var(--transition);
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 15px;
            font-family: var(--font-family);
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i {
            color: var(--accent);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .btn-primary.btn-block {
            width: 100%;
            justify-content: center;
            padding: 12px;
            font-size: 16px;
            margin-top: 4px;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .login-footer span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Alertas dentro del login */
        .alert {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid transparent;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.10);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.20);
        }
        .alert-error i {
            color: var(--danger);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-box {
                padding: 28px 20px;
            }
            .login-header h1 {
                font-size: 24px;
            }
            .login-icon {
                font-size: 44px;
            }
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="login-icon">🕯️</span>
                <h1>VesperBot</h1>
                <p>Panel de control del relicario</p>
            </div>

            <form method="POST" action="/login" class="login-form" autocomplete="off">
                {% if error %}
                <div class="alert alert-error">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ error }}
                </div>
                {% endif %}

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Ingresa la contraseña" required autofocus>
                        <i class="fas fa-key"></i>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i>
                    Acceder al Dashboard
                </button>
            </form>

            <div class="login-footer">
                <span>🔒 Acceso restringido al streamer</span>
            </div>
        </div>
    </div>

    <!-- Pequeño script para mantener la consistencia visual -->
    <script>
        // Si hay un error, aseguramos que el campo contraseña tenga el foco
        document.addEventListener('DOMContentLoaded', function() {
            const error = document.querySelector('.alert-error');
            if (error) {
                const input = document.getElementById('password');
                if (input) input.focus();
            }
        });
    </script>
</body>
</html>
